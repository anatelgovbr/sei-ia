# Basic Airflow cluster configuration for CeleryExecutor with Redis and PostgreSQL.
#
# WARNING: This configuration is for local development. Do not use it in a production deployment.
#
# This configuration supports basic configuration using environment variables or an .env file
# The following variables are supported:
#
# AIRFLOW_IMAGE_NAME           - Docker image name used to run Airflow.
#                                Default: apache/airflow:2.6.3
# AIRFLOW_UID                  - User ID in Airflow containers
#                                Default: 50000
# Those configurations are useful mostly in case of standalone testing/running Airflow in test/try-out mode
#
# _AIRFLOW_WWW_USER_USERNAME   - Username for the administrator account (if requested).
#                                Default: airflow
# _AIRFLOW_WWW_USER_PASSWORD   - Password for the administrator account (if requested).
#                                Default: airflow
# _PIP_ADDITIONAL_REQUIREMENTS - Additional PIP requirements to add when starting all containers.
#                                Use this option ONLY for quick checks. Installing requirements at container
#                                startup is done EVERY TIME the service is started.
#                                A better way is to build a custom image or extend the official image
#                                as described in https://airflow.apache.org/docs/docker-stack/build.html.
#                                Default: ''
#
# Feel free to modify this file to suit your needs.
---
version: '3.8'
x-airflow-common:
  &airflow-common
  # In order to add custom dependencies or upgrade provider packages you can use your extended image.
  # Comment the image line, place your Dockerfile in the directory where you placed the docker-compose.yaml
  # and uncomment the "build" line below, Then run `docker-compose build` to build the images.
  #image: apache/airflow:2.6.3
  # build: .
  image: airflow:0.0.41-oracle
  build:
    context: .
    dockerfile: ./airflow-local.dockerfile
    network: host
    args:
      AIRFLOW_UID: ${AIRFLOW_UID:-50000}
      NB_USER: ${NB_USER}
      NB_UID: ${NB_UID}
      NB_GID: ${NB_GID}
      GIT_TOKEN: ${GIT_TOKEN}
      DB_SEIIA_HOST : ${DB_SEIIA_HOST}
      DB_SEIIA_USER : ${DB_SEIIA_USER}
      DB_SEIIA_PWD : ${DB_SEIIA_PWD}
      DB_SEIIA_ASSISTENTE : ${DB_SEIIA_ASSISTENTE}
      DB_SEIIA_PORT_DESENV : ${DB_SEIIA_PORT_DESENV}
  networks:
      - network1
  env_file:
      - ../../default.env
      - ../../security.env
  environment:
    &airflow-common-env
    AIRFLOW_API_BASE_URL: 'http://airflow-webserver-local:8080/api/v1'
    AIRFLOW_HEALTH_WEBSERVER_HOST: airflow-webserver-local
    GIT_TOKEN: ${GIT_TOKEN}
    DB_SEIIA_HOST : ${DB_SEIIA_HOST}
    DB_SEIIA_USER : ${DB_SEIIA_USER}
    DB_SEIIA_PWD : ${DB_SEIIA_PWD}
    DB_SEIIA_ASSISTENTE : ${DB_SEIIA_ASSISTENTE}
    TZ: America/Sao_Paulo
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__CELERY__WORKER_CONCURRENCY: ${AIRFLOW__CELERY__WORKER_CONCURRENCY}
    AIRFLOW__CORE__MAX_ACTIVE_RUNS_PER_DAG: ${AIRFLOW__CORE__MAX_ACTIVE_RUNS_PER_DAG}
        
    #configuração do ETL da nossa aplicação
    SOLR_MLT_PROCESS_CORE: ${SOLR_MLT_PROCESS_CORE}
    SOLR_MLT_JURISPRUDENCE_CORE : ${SOLR_MLT_JURISPRUDENCE_CORE}
    MLT_PROCESS_CONFIGSET: '/var/solr/configsets/process'
    MLT_JURISPRUDENCE_CONFIGSET: '/var/solr/configsets/jurisprudence'
    
    ENVIRONMENT: ${ENVIRONMENT}
    
    AIRFLOW__CORE__MAX_MAP_LENGTH: 1024
    AIRFLOW_HOME: /opt/airflow
    #AIRFLOW__WEBSERVER__SECRET_KEY: $(openssl rand -base64 32)
    #AIRFLOW__CORE__FERNET_KEY: $(python3 -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())")
    _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME}
    _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD}
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_POSTGRES_USER:-airflow}:${AIRFLOW_POSTGRES_PASSWORD:-airflow}@airflow_postgres_local:5433/${AIRFLOW_POSTGRES_DB:-airflow}
    # For backward compatibility, with Airflow <2.3
    # AIRFLOW__CORE__SQL_ALCHEMY_CONN:  postgresql+psycopg2://${AIRFLOW_POSTGRES__USER}:${AIRFLOW_POSTGRES__USER}@airflow_postgres_local:5433/airflow
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://${AIRFLOW_POSTGRES_USER:-airflow}:${AIRFLOW_POSTGRES_PASSWORD:-airflow}@airflow_postgres_local:5433/${AIRFLOW_POSTGRES_DB:-airflow}
    AIRFLOW__CELERY__BROKER_URL: amqp://${AIRFLOW_AMQP_USER:-airflow}:${AIRFLOW_AMQP_PASSWORD:-airflow}@airflow_rabbitmq-local:5672
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    # yamllint disable rule:line-length
    # Use simple http server on scheduler for health checks
    # See https://airflow.apache.org/docs/apache-airflow/stable/administration-and-deployment/logging-monitoring/check-health.html#scheduler-health-check-server
    # yamllint enable rule:line-length
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    # WARNING: Use _PIP_ADDITIONAL_REQUIREMENTS option ONLY for a quick checks
    # for other purpose (development, test and especially production usage) build/extend Airflow image.
    _PIP_ADDITIONAL_REQUIREMENTS: ${_PIP_ADDITIONAL_REQUIREMENTS:-}
    AIRFLOW__CELERY_BROKER_TRANSPORT_OPTIONS__VISIBILITY_TIMEOUT: 86400
    AIRFLOW__CORE__TEST_CONNECTION: Enabled
    LD_PRELOAD: /usr/lib/x86_64-linux-gnu/libstdc++.so.6 #bug airflow /usr/lib/x86_64-linux-gnu/libstdc++.so.6: cannot allocate memory in static TLS block
    
    # Volume compartilhado

    # Stack sei-similaridade
    AIRFLOW_DB_EXTERNAL_CONNECTION: true
    API_VERSION: ${API_SEI_IMAGE}
    APP_VERSION: ${APP_API}
    SOLR_ADDRESS: ${SOLR_ADDRESS}
    CONN_STRING_APP_DB: "postgresql+psycopg2://${DB_SEIIA_USER}:${DB_SEIIA_PWD}@${DB_SEIIA_HOST}/${DB_SEIIA_SIMILARIDADE}"
    CONN_LOG_DB_STRING: "postgresql+psycopg2://${DB_SEIIA_USER}:${DB_SEIIA_PWD}@${DB_SEIIA_HOST}/${DB_SEIIA_SIMILARIDADE}"
    APP_API_RECOMMENDER_URL: "http://api_sei:8082/process-recommenders/weighted-mlt-recommender/recommendations-by-id-protocolo/{}?rows=5&debug=false"
    SOLR_USER: ${SOLR_USER}
    SOLR_PASSWORD: ${SOLR_PASSWORD}

    AIRFLOW_CONN_DB_SEI_MYSQL: ${AIRFLOW_CONN_DB_SEI_MYSQL}

    # Stack assistente
  volumes:
    &airflow-common-volumes
    - deletar-airflow-logs-volume:/opt/airflow/logs
    # - ${STORAGE_PROJ_DIR}:/opt/sei_similaridade
    #- ./jobs/dags/dag_objects:/opt/airflow/dags
    - ./dags_container:/opt/airflow/dags
    - ./jobs:/home/airflow/app/jobs
  
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    &airflow-common-depends-on
    airflow_rabbitmq-local:
      condition: service_healthy
    airflow_postgres_local:
      condition: service_healthy

services:
  airflow_postgres_local:
    profiles:
      - all
      - airflow
    image: postgres:13
    environment:
      POSTGRES_USER: ${AIRFLOW_POSTGRES_USER:-airflow}
      POSTGRES_PASSWORD: ${AIRFLOW_POSTGRES_PASSWORD:-airflow}
      POSTGRES_DB: ${AIRFLOW_POSTGRES_DB:-airflow}
      PGPORT: 5433
      TZ: America/Sao_Paulo
    #command: postgres -c config_file=/etc/postgresql/postgresql.conf
    volumes:
      - deletar-airflow-postgres-db-volume:/var/lib/postgresql/data
      
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always
    networks:
      - network1
    deploy:
      resources:
        limits:
          memory: ${AIRFLOW_POSTGRES_MEM_LIMIT}
          cpus: ${AIRFLOW_POSTGRES_CPU_LIMIT}
    

  airflow_rabbitmq-local:
    image: rabbitmq:3-management
    hostname: rabbitmq
    profiles:
      - all
      - airflow
    environment:
      RABBITMQ_ERLANG_COOKIE: SWQOKODSQALRPCLNMEQG  
      RABBITMQ_DEFAULT_USER: ${AIRFLOW_AMQP_USER:-airflow}
      RABBITMQ_DEFAULT_PASS: ${AIRFLOW_AMQP_PASSWORD:-airflow}
      TZ: America/Sao_Paulo
    # ports:
    #   - "5772:5672"
    #   - "17672:15672"
    volumes: *airflow-common-volumes

    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 10s
      timeout: 30s
      retries: 5
    restart: always
    networks:
      - network1
    deploy:
      resources:
        limits:  
          memory: ${RABBITMQ_MEM_LIMIT}
          cpus: ${RABBITMQ_CPU_LIMIT}

  airflow-webserver-local:
    <<: *airflow-common
    command: webserver
    profiles:
      - all
      - airflow
    ports:
      - "8182:8080"
    healthcheck:
      test: ["CMD", "sh", "/home/airflow/app/healthcheck/airflow_webserver.sh"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init-local:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: ${AIRFLOW_WEBSERVER_MEM_LIMIT}
          cpus: ${AIRFLOW_WEBSERVER_CPU_LIMIT}
    volumes: *airflow-common-volumes


  airflow-scheduler-local:
    <<: *airflow-common
    command: scheduler
    profiles:
      - all
      - airflow
    healthcheck:
      test: ["CMD", "sh", "/home/airflow/app/healthcheck/airflow_scheduler.sh"]
      interval: 30s
      timeout: 60s
      retries: 10
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init-local:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: ${AIRFLOW_SCHEDULER_MEM_LIMIT}
          cpus: ${AIRFLOW_SCHEDULER_CPU_LIMIT}
      replicas: 1
    volumes: *airflow-common-volumes

  airflow-worker-local:
    <<: *airflow-common
    command: celery worker
    profiles:
      - all
      - airflow
    healthcheck:
      test: ["CMD", "sh", "/home/airflow/app/healthcheck/airflow_worker.sh"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    environment:
      <<: *airflow-common-env
      # Required to handle warm shutdown of the celery workers properly
      # See https://airflow.apache.org/docs/docker-stack/entrypoint.html#signal-propagation
      DUMB_INIT_SETSID: "0"
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init-local:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: ${AIRFLOW_WORKER_MEM_LIMIT}
          cpus: ${AIRFLOW_WORKER_CPU_LIMIT}
      replicas: 1
    volumes: *airflow-common-volumes

  airflow-triggerer-local:
    <<: *airflow-common
    profiles:
      - all
      - airflow
    command: triggerer
    healthcheck:
      test: ["CMD", "sh", "/home/airflow/app/healthcheck/airflow_triggerer.sh"]
      interval: 30s
      timeout: 60s
      retries: 10
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init-local:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: ${AIRFLOW_TRIGGERER_MEM_LIMIT}
          cpus: ${AIRFLOW_TRIGGERER_CPU_LIMIT}
    volumes: *airflow-common-volumes

  airflow-init-local:
    <<: *airflow-common
    entrypoint: /bin/bash
    profiles:
      - all
      - airflow
    # yamllint disable rule:line-length
    command:
      - -c
      - |
        if [[ -z "${AIRFLOW_UID}" ]]; then
          echo
          echo -e "\033[1;33mWARNING!!!: AIRFLOW_UID not set!\e[0m"
          echo "If you are on Linux, you SHOULD follow the instructions below to set "
          echo "AIRFLOW_UID environment variable, otherwise files will be owned by root."
          echo "For other operating systems you can get rid of the warning with manually created .env file:"
          echo "    See: https://airflow.apache.org/docs/apache-airflow/stable/howto/docker-compose/index.html#setting-the-right-airflow-user"
          echo
        fi
        one_meg=1048576
        mem_available=$$(($$(getconf _PHYS_PAGES) * $$(getconf PAGE_SIZE) / one_meg))
        cpus_available=$$(grep -cE 'cpu[0-9]+' /proc/stat)
        disk_available=$$(df / | tail -1 | awk '{print $$4}')
        warning_resources="false"
        if (( mem_available < 4000 )) ; then
          echo
          echo -e "\033[1;33mWARNING!!!: Not enough memory available for Docker.\e[0m"
          echo "At least 4GB of memory required. You have $$(numfmt --to iec $$((mem_available * one_meg)))"
          echo
          warning_resources="true"
        fi
        if (( cpus_available < 2 )); then
          echo
          echo -e "\033[1;33mWARNING!!!: Not enough CPUS available for Docker.\e[0m"
          echo "At least 2 CPUs recommended. You have $${cpus_available}"
          echo
          warning_resources="true"
        fi
        if (( disk_available < one_meg * 10 )); then
          echo
          echo -e "\033[1;33mWARNING!!!: Not enough Disk space available for Docker.\e[0m"
          echo "At least 10 GBs recommended. You have $$(numfmt --to iec $$((disk_available * 1024 )))"
          echo
          warning_resources="true"
        fi
        if [[ $${warning_resources} == "true" ]]; then
          echo
          echo -e "\033[1;33mWARNING!!!: You have not enough resources to run Airflow (see above)!\e[0m"
          echo "Please follow the instructions to increase amount of resources available:"
          echo "   https://airflow.apache.org/docs/apache-airflow/stable/howto/docker-compose/index.html#before-you-begin"
          echo
        fi
        mkdir -p /sources/logs /sources/dags /sources/plugins
        chown -R "${AIRFLOW_UID}:0" /sources/{logs,dags,plugins}
        exec /entrypoint airflow version
    # yamllint enable rule:line-length
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_UPGRADE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-airflow}
      _PIP_ADDITIONAL_REQUIREMENTS: ''
    user: "0:0"

  airflow-cli:
    <<: *airflow-common
    profiles:
      - debug
    environment:
      <<: *airflow-common-env
      CONNECTION_CHECK_MAX_COUNT: "0"
    # Workaround for entrypoint issue. See: https://github.com/apache/airflow/issues/16252
    command:
      - bash
      - -c
      - airflow

volumes:
  deletar-airflow-postgres-db-volume:
  deletar-airflow-logs-volume:

networks:
  network1:
    name: docker-host-bridge
    external: true
