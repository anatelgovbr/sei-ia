    TEST_MYSQL_SUB_PROCESSES_DATA_PATH=tests/integration/data/subprocesses_test_data.csv
    TEST_MYSQL_RELATED_PROCESSES_DATA_PATH=tests/integration/data/related_processes_docs_test_data.parquet
    TEST_POSTGRES_VERSION_MANAGER_DATA_PATH=tests/integration/data/postgres_version_manager.csv
    TEST_POSTGRES_PORT = 8996
    TEST_POSTGRES_SEI_DB_NAME = sei_similaridade
    TEST_POSTGRES_ADDRESS = postgresql://sei:seisimilaridade@localhost:8996/sei_similaridade
    TEST_POSTGRES_CONTAINER_NAME = tests-postgres
    CONN_STRING_APP_DB=postgresql+psycopg2://sei:seisimilaridade@localhost:8996/sei_similaridade
    MLT_PROCESS_CONFIGSET='/var/solr/configsets/process'
    SOLR_ADDRESS=http://localhost:8997
    SOLR_PORT=8997
    SOLR_MLT_PROCESS_CORE = process

    DB_SEI_USER=root
    DB_SEI_PWD=pwd
    DB_SEI_HOST=localhost
    DB_SEI_DATABASE=test
    DB_SEI_PORT=8998
    DB_SEI_SCHEMA=test
    DATABASE_TYPE=mysql



addopts = 
    -v
    -s 
    --cov jobs
    --cov-config=.coveragerc
    --ignore=jobs/__init__.py

markers =
    integration: testes de integracao.