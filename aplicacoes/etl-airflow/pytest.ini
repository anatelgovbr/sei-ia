    TEST_SOLR_SEI_PROTOCOLOS_CORE_CONF=sei_protocolos
    TEST_SOLR_IMAGE_NAME=solr:testing
    TEST_SOLR_CONFIGS_SRC_PATH=jobs/configs/solr_core_configs/configsets
    TEST_SOLR_CONFIGS_DST_PATH=tests/integration/solr_core_configs
    TEST_SOLR_DOCKERFILE_SRC_PATH=jobs/configs/solr.dockerfile
    TEST_SOLR_DOCKERFILE_DST_PATH=tests/integration/solr.dockerfile
    TEST_SOLR_SEI_PROTOCOLOS_DATA_PATH=tests/integration/data/solr_external_docs_test_data.json
    TEST_MYSQL_PORT=8998
