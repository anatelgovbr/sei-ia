[pytest]
env = 
    TEST_SOLR_PORT=8997
    TEST_SOLR_ADDRESS=http://localhost:8997
    TEST_SOLR_PROCESS_CORE_NAME=process
    TEST_SOLR_SEI_PROTOCOLOS_CORE_NAME=sei_protocolos
