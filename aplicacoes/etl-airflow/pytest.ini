    TEST_MYSQL_SEI_DB_NAME=test
    TEST_MYSQL_CONTAINER_NAME=tests-mysql
    TEST_MYSQL_INTERNAL_DOCS_DATA_PATH=tests/integration/data/mysql_internal_docs_test_data.parquet
