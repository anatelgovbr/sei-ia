.quality_job:
  stage: quality
  image: python:3.12-slim
  needs:
    - runner-branch-check
  cache:
    key: "pip-cache"
    paths:
      - .cache/pip
  before_script:
    - python --version
    - python -m pip install --upgrade pip
    - python -m pip install "ruff==0.14.10"

.test_job:
  stage: test
  image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
  variables:
    UV_CACHE_DIR: "$CI_PROJECT_DIR/.cache/uv"
    UV_COMPILE_BYTECODE: "1"
    UV_LINK_MODE: "copy"
  cache:
    key: "uv-assistente-${CI_COMMIT_REF_SLUG}"
    paths:
      - .cache/uv
    policy: pull-push
  before_script:
    - uv --version
    - cd aplicacoes/assistente
    - uv sync --extra dev

linter:assistente:dev:
  stage: quality
  extends: .quality_job
  script:
    - echo "========== Ruff Linter Assistente (dev/hm - allow_failure) =========="
    - cd aplicacoes/assistente
    - ruff check --statistics .
  allow_failure: true
  rules:
    - if: $CI_COMMIT_REF_NAME =~ /^(dev|develop|desenvolvimento|hm|homolog|homologacao)$/
      changes:
        - .gitlab-ci.yml
        - .gitlab/ci/**/*
        - aplicacoes/assistente/*
        - aplicacoes/assistente/**/*
    - if: $CI_COMMIT_REF_NAME =~ /^(dev|hm)\//
      changes:
        - .gitlab-ci.yml
        - .gitlab/ci/**/*
        - aplicacoes/assistente/*
        - aplicacoes/assistente/**/*

linter:assistente:
  stage: quality
  extends: .quality_job
  script:
    - echo "========== Ruff Linter Assistente (pd/main - bloqueia merge) =========="
    - cd aplicacoes/assistente
    - ruff check --statistics .
  allow_failure: false
  rules:
    - if: $CI_COMMIT_REF_NAME =~ /^(pd|prod|producao|main|master)$/
      changes:
        - .gitlab-ci.yml
        - .gitlab/ci/**/*
        - aplicacoes/assistente/*
        - aplicacoes/assistente/**/*
    - if: $CI_COMMIT_REF_NAME =~ /^(pd|prod)\//
      changes:
        - .gitlab-ci.yml
        - .gitlab/ci/**/*
        - aplicacoes/assistente/*
        - aplicacoes/assistente/**/*
    - when: never

