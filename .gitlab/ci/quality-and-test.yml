e2e_test:assistente:dev:
  stage: test
  extends: .test_job
  needs:
    - job: linter:assistente:dev
      optional: true
    - job: linter:assistente
      optional: true
    - job: formatter:assistente:dev
      optional: true
    - job: formatter:assistente
      optional: true
  script:
    - echo "========== Testes E2E Assistente (dev/hm - allow_failure) =========="
    - uv run pytest tests/e2e/test_service.py -v --tb=short
  timeout: 30m
  allow_failure: true
  artifacts:
    when: on_failure
    paths:
      - aplicacoes/assistente/tests/e2e/*.log
    expire_in: 3 days
  rules:
    - if: $CI_COMMIT_REF_NAME =~ /^(dev|develop|desenvolvimento|hm|homolog|homologacao)$/
      changes:
        - .gitlab-ci.yml
        - .gitlab/ci/**/*
        - aplicacoes/assistente/*
        - aplicacoes/assistente/**/*
    - if: $CI_COMMIT_REF_NAME =~ /^(dev|hm)\//
      changes:
        - .gitlab-ci.yml
        - .gitlab/ci/**/*
        - aplicacoes/assistente/*
        - aplicacoes/assistente/**/*

e2e_test:assistente:
  stage: test
  extends: .test_job
  needs:
    - job: linter:assistente:dev
